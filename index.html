<!DOCTYPE html>
<html>
<head>
  <title>Trust Center</title>
</head>
<body>

<div id="company"></div>

<script>
async function loadCompany() {
  const res = await fetch("https://secure-trust-sphere.base44.app/api/entities/Company", {
    headers: {
      "api_key": "8d8d59950a8c4038a52509b3072e21b7"
    }
  });

  const data = await res.json();

  const params = new URLSearchParams(window.location.search);
  const slug = params.get("client");

  const company = data.find(c => c.trust_slug === slug);

  const container = document.getElementById("company");

  container.innerHTML = `
    <h1>${company.company_name}</h1>
    <p>${company.description}</p>
    <div style="background:${company.hero_bg_color};padding:20px;color:white;">
      Hero section
    </div>
  `;
}

loadCompany();
</script>

</body>
</html>
